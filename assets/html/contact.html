<div class="flexCenter colorSetA">
  <div class="container flexColumn">
    <h1>Kontakt</h1>
    <p>Schreib uns eine Nachricht, wir melden uns!</p>
    <form id="contactForm" class="flexColumn">
      <input
        type="text"
        id="firstName"
        name="firstName"
        placeholder="Vorname"
        required
      />
      <input
        type="text"
        id="lastName"
        name="lastName"
        placeholder="Nachname"
        required
      />
    </form>
  </div>
</div>
